[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "BOOKING_URL,KI_MODEL,KI_PROVIDER"

[functions]
  node_bundler = "esbuild"
  included_files = ["prompts/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
